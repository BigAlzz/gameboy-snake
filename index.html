<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Boy Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #2a3d2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        .gameboy {
            background: linear-gradient(90deg, #358c3a, #2d6e30);
            border-radius: 40px 40px 120px 40px;
            padding: 30px;
            box-shadow: 
                inset -5px 0 rgba(0,0,0,0.2),
                inset 5px 0 rgba(0,0,0,0.2),
                10px 0 rgba(0,0,0,0.3);
            display: flex;
            gap: 15px;
        }

        .screen-container {
            background: #5a6e5a;
            padding: 25px;
            border-radius: 10px 10px 40px 10px;
            position: relative;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                transparent,
                transparent calc(1px),
                rgba(0,0,0,0.2) calc(1px)
            );
            pointer-events: none;
        }

        .screen {
            position: relative;
            z-index: 1;
            background: #9bbc0f;
            border-radius: 5px;
            display: inline-block;
        }

        /* Game Boy Screen Colors */
        .screen-content {
            background: #368c07;
            padding: 4px;
            display: grid;
            gap: 2px;
        }

        .pixel { width: 12px; height: 12px; border-radius: 1px; }
        .pixel.on { background: #8bac0f; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3); }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .d-pad {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .d-pad::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #3a3a3a;
            border-radius: 4px;
        }

        .d-pad::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #3a3a3a;
            border-radius: 4px;
        }

        .d-pad::first-line {
            position: absolute;
            top: -8px;
            left: 0;
            right: 0;
            height: 15px;
            background: #3a3a3a;
            border-radius: 4px;
        }

        .d-pad::last-line {
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 15px;
            background: #3a3a3a;
            border-radius: 4px;
        }

        .d-pad div {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .d-pad div.active {
            background: linear-gradient(135deg, #6a6a6a, #4a4a4a);
            transform: scale(1.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .d-pad div:hover {
            background: linear-gradient(135deg, #6a6a6a, #4a4a4a);
        }

        .action-btn {
            background: #c42b1f;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s;
        }

        .action-btn.active {
            transform: scale(1.3);
            box-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }

        .action-btn:hover {
            background: #e43f2f;
        }

        /* Score Display */
        .score-board {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 10px;
            color: #5a6e5a;
            z-index: 2;
            text-shadow: none;
        }

        /* Start/Select Buttons */
        .start-select {
            display: flex;
            gap: 8px;
            padding-top: 10px;
            margin-left: 35px;
        }

        .action-btn.start, 
        .action-btn.select {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #c42b1f;
        }

        .action-btn.select {
            background: #ff9a00;
        }

        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: #5a6e5a;
            text-align: center;
            z-index: 2;
            white-space: nowrap;
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-btn {
            background: #c42b1f;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .overlay-btn:hover {
            background: #e43f2f;
        }
    </style>
</head>
<body>
    <div class="gameboy">
        <div class="screen-container">
            <div class="scanlines"></div>
            <div class="score-board">SCORE: <span id="score">0</span></div>
            <div class="instructions">↑↓←→ to move • SPACE to start</div>
            
            <div class="overlay" id="startOverlay">
                <button class="overlay-btn" onclick="startGame()">
                    START GAME
                </button>
            </div>

            <div class="screen-content" id="grid"></div>
        </div>

        <div class="controls">
            <div class="d-pad">
                <div class="key" data-key="ArrowUp" onclick="handleInput('up')">↑</div>
                <div class="key" data-key="ArrowDown" onclick="handleInput('down')">↓</div>
                <div class="key" data-key="ArrowLeft" onclick="handleInput('left')">←</div>
                <div class="key" data-key="ArrowRight" onclick="handleInput('right')">→</div>
            </div>

            <div class="start-select">
                <div class="action-btn start" id="startBtn" onclick="toggleStart()"></div>
                <div class="action-btn select" id="selectBtn" onclick="handleSelect()"></div>
            </div>
        </div>
    </div>

    <script>
        // Game constants
        const GRID_SIZE = 16;
        const PIXEL_SIZE = 20;
        
        // Snake state
        let snake = [{x: 7, y: 7}, {x: 6, y: 7}, {x: 5, y: 7}];
        let direction = 'up';
        let nextDirection = 'up';
        let food = null;
        let score = 0;
        let gameRunning = false;
        let gameOver = false;
        let gameLoopId = null;
        let lastMoveTime = 0;
        let moveInterval = 150; // ms
        
        // Audio context for retro sounds
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                    latency: 0
                });
            }
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            switch(type) {
                case 'move':
                    oscillator.frequency = 800;
                    oscillator.type = 'square';
                    break;
                case 'eat':
                    oscillator.frequency = 1200;
                    oscillator.type = 'triangle';
                    break;
                case 'gameover':
                    oscillator.frequency = 200;
                    oscillator.type = 'sawtooth';
                    break;
            }

            gainNode.gainvalue = 0.1;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            setTimeout(() => oscillator.stop(), 50);
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const pixel = document.createElement('div');
                    pixel.className = 'pixel';
                    if (snake.some(s => s.x === x && s.y === y)) {
                        pixel.classList.add('on');
                    }
                    grid.appendChild(pixel);
                }
            }
        }

        function updateGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const pixel = document.createElement('div');
                    pixel.className = 'pixel';
                    if (snake.some(s => s.x === x && s.y === y)) {
                        pixel.classList.add('on');
                    }
                    grid.appendChild(pixel);
                }
            }
        }

        function moveSnake() {
            const head = { ...snake[0] };
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Check bounds
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // Check self-collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);
            
            if (!food) {
                playSound('move');
            } else {
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    createFood();
                    playSound('eat');
                }
            }

            snake.pop();
        }

        function createFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(s => s.x === newFood.x && s.y === newFood.y));
            
            food = newFood;
        }

        function handleInput(key) {
            if (!gameRunning || gameOver) return;

            const opposites = {'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'};
            
            // Prevent reversing direction
            if (opposites[key] !== direction && key !== nextDirection) {
                direction = key;
                nextDirection = key;
                playSound('move');
            }
        }

        function handleSelect() {
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameOver) {
                resetGame();
            }
        }

        async function startGame() {
            initAudio();
            document.getElementById('startOverlay').classList.add('hidden');
            gameRunning = true;
            
            // Reset game state
            snake = [{x: 7, y: 7}, {x: 6, y: 7}, {x: 5, y: 7}];
            direction = 'up';
            nextDirection = 'up';
            score = 0;
            gameOver = false;
            
            createGrid();
            updateGrid();
            createFood();

            // Start game loop
            lastMoveTime = 0;
            await new Promise(1);
        }

        function resetGame() {
            snake = [{x: 7, y: 7}, {x: 6, y: 7}, {x: 5, y: 7}];
            direction = 'up';
            nextDirection = 'up';
            score = 0;
            gameOver = false;
            createFood();
        }

        function endGame() {
            if (gameOver) return; // Already ended
            gameRunning = false;
            gameOver = true;
            playSound('gameover');
            
            const overlay = document.getElementById('startOverlay');
            overlay.classList.remove('hidden');
            overlay.innerHTML = '<button class="overlay-btn" onclick="resetGame()">TRY AGAIN</button>';
        }

        function gameLoop(timestamp) {
            if (!gameRunning || gameOver) return;

            if (timestamp - lastMoveTime > moveInterval) {
                moveSnake();
                updateGrid();
                lastMoveTime = timestamp;
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gameOver) return;
            
            switch(e.code) {
                case 'ArrowUp':
                    handleInput('up');
                    break;
                case 'ArrowDown':
                    handleInput('down');
                    break;
                case 'ArrowLeft':
                    handleInput('left');
                    break;
                case 'ArrowRight':
                    handleInput('right');
                    break;
                case 'Space':
                    if (!gameRunning && !gameOver) {
                        startGame();
                    } else if (gameOver) {
                        resetGame();
                    }
                    break;
            }
        });

        // Initialize
        createGrid();
    </script>
</body>
</html>"
